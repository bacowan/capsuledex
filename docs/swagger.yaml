openapi: 3.0.0
info:
  title: Gachapon Capsule Database API
  version: 1.0.0
  description: API for managing gachapon capsule series and pamphlet images.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

tags:
  - name: Series
    description: Capsule series endpoints
  - name: Images
    description: Pamphlet image endpoints

paths:

  /api/series/{barcode-number}:

    get:
      summary: Get a capsule series by barcode
      tags: [Series]
      parameters:
        - name: barcode-number
          in: path
          required: true
          schema:
            type: string
          description: The barcode number of the capsule series
      responses:
        '200':
          description: Capsule series found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Series'
        '404':
          description: Series not found

    delete:
      summary: Delete a capsule series by barcode
      tags: [Series]
      security:
        - bearerAuth: []
      parameters:
        - name: barcode-number
          in: path
          required: true
          schema:
            type: string
          description: The barcode number of the capsule series to delete
      responses:
        '204':
          description: Series deleted successfully
        '401':
          description: Not authenticated
        '403':
          description: Not authorized (must be uploader or admin)
        '404':
          description: Series not found

  /api/series/{barcode-number}/images:

    get:
      summary: Get all images associated with a series
      tags: [Series]
      parameters:
        - name: barcode-number
          in: path
          required: true
          schema:
            type: string
          description: The barcode number of the capsule series
      responses:
        '200':
          description: Images retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  pamphlet-fronts:
                    type: array
                    items:
                      $ref: '#/components/schemas/ImageSummary'
                  pamphlet-backs:
                    type: array
                    items:
                      $ref: '#/components/schemas/ImageSummary'
        '404':
          description: Series not found

  /api/images/pamphlets/{id}:

    get:
      summary: Get info about a pamphlet image
      tags: [Images]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The UUID of the pamphlet image
      responses:
        '200':
          description: Pamphlet image info retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PamphletImage'
        '404':
          description: Image not found

  /api/images/pamphlets:

    post:
      summary: Add or update a capsule series by uploading pamphlet images
      tags: [Images]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - front
                - back
              properties:
                front:
                  type: string
                  format: binary
                  description: Front image of the pamphlet
                back:
                  type: string
                  format: binary
                  description: Back image of the pamphlet
      responses:
        '200':
          description: Pamphlet parsed and series created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PamphletImage'
        '401':
          description: Not authenticated
        '422':
          description: Parsing confidence too low
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Parsing confidence too low to extract series data reliably

  /api/images/pamphlets/{image-id}:

    delete:
      summary: Delete a pamphlet image
      tags: [Images]
      security:
        - bearerAuth: []
      parameters:
        - name: image-id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The UUID of the image to delete
      responses:
        '204':
          description: Image deleted successfully
        '401':
          description: Not authenticated
        '403':
          description: Not authorized (must be uploader or admin)
        '404':
          description: Image not found

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    Brand:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        url:
          type: string
          format: uri

    Variant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    Series:
      type: object
      properties:
        barcode:
          type: string
        series:
          type: string
        url:
          type: string
          format: uri
        pamphlet-front-id:
          type: string
          format: uuid
        pamphlet-back-id:
          type: string
          format: uuid
        brand:
          $ref: '#/components/schemas/Brand'
        variants:
          type: array
          items:
            $ref: '#/components/schemas/Variant'

    ImageSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri

    SeriesSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    PamphletImage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        side:
          type: string
          enum: [front, back]
        series:
          $ref: '#/components/schemas/SeriesSummary'
        upvotes:
          type: integer
        uploaded-by-current-user:
          type: boolean